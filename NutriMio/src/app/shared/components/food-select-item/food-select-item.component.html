<article class="food-card" [class.selected]="selected">
  <button type="button" class="card-main" (click)="onToggle()">
    <ion-icon
      class="check-icon"
      [name]="selected ? 'checkmark-circle' : 'ellipse-outline'"
      aria-hidden="true"
    ></ion-icon>

    <div class="info">
      <span class="name">{{ food.name }}</span>
      <span class="portion-meta">
        Porção {{ food.quantity }}{{ food.unit }} · {{ food.calories }} kcal
      </span>

      <div class="macro-tags">
        <span class="macro-tag protein">
          <span class="dot"></span>P {{ displayMacros.protein | nutrition }}g
        </span>
        <span class="macro-tag carbs">
          <span class="dot"></span>C {{ displayMacros.carbs | nutrition }}g
        </span>
        <span class="macro-tag fat">
          <span class="dot"></span>G {{ displayMacros.fat | nutrition }}g
        </span>
      </div>
    </div>
  </button>

  @if (selected && consumedQuantity !== null) {
    <div class="selected-row" (click)="$event.stopPropagation()">
      <div class="quantity-stepper">
        <button
          type="button"
          class="step-btn"
          aria-label="Diminuir quantidade"
          [disabled]="!canDecrement"
          (click)="decrement()"
        >
          <ion-icon name="remove-outline" aria-hidden="true"></ion-icon>
        </button>

        <label class="qty-input-wrap">
          <span class="sr-only">Quantidade consumida</span>
          <input
            class="qty-input"
            type="number"
            inputmode="decimal"
            min="0.1"
            step="any"
            [value]="formatQuantity(consumedQuantity)"
            [attr.aria-label]="'Quantidade em ' + food.unit"
            (click)="$event.stopPropagation()"
            (input)="onQuantityInput($event)"
            (blur)="onQuantityBlur($event)"
          />
        </label>
        <span class="qty-unit">{{ food.unit }}</span>

        <button
          type="button"
          class="step-btn"
          aria-label="Aumentar quantidade"
          (click)="increment()"
        >
          <ion-icon name="add-outline" aria-hidden="true"></ion-icon>
        </button>
      </div>

      @if (scaledFood; as scaled) {
        <div class="totals">
          <span class="kcal">{{ scaled.calories | nutrition }} kcal</span>
          <span class="macro-summary">
            P {{ scaled.macros.protein | nutrition }} · C {{ scaled.macros.carbs | nutrition }} · G
            {{ scaled.macros.fat | nutrition }}
          </span>
        </div>
      }

      <button
        type="button"
        class="remove-btn"
        aria-label="Remover alimento"
        (click)="onRemove()"
      >
        <ion-icon name="trash-outline" aria-hidden="true"></ion-icon>
      </button>
    </div>
  }
</article>
