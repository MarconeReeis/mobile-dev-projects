<section class="summary-card">
  <span class="eyebrow">RESUMO DA REFEIÇÃO</span>
  <p class="calories">{{ summary.calories }} kcal</p>

  <div class="macro-totals">
    <span class="macro protein">
      <strong>{{ summary.macros.protein }}g</strong> Proteínas
    </span>
    <span class="macro carbs">
      <strong>{{ summary.macros.carbs }}g</strong> Carbos
    </span>
    <span class="macro fat">
      <strong>{{ summary.macros.fat }}g</strong> Gorduras
    </span>
    <span class="macro sugar">
      <strong>{{ summary.macros.sugar }}g</strong> Açúcares
    </span>
  </div>
</section>
