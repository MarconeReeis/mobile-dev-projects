<div class="empty-state">
  <div class="icon-wrap">
    <ion-icon [name]="icon" aria-hidden="true"></ion-icon>
  </div>
  <h3>{{ title }}</h3>
  <p>{{ message }}</p>
  @if (actionLabel) {
    <button type="button" class="action-button" (click)="action.emit()">
      {{ actionLabel }}
    </button>
  }
</div>
