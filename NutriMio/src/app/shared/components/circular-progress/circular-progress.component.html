<div class="circular-progress">
  <svg viewBox="0 0 36 36" aria-hidden="true">
    <path
      class="track"
      d="M18 2.0845
        a 15.9155 15.9155 0 0 1 0 31.831
        a 15.9155 15.9155 0 0 1 0 -31.831"
    />
    <path
      class="fill"
      [attr.stroke]="color"
      [style.stroke-dashoffset]="dashOffset"
      d="M18 2.0845
        a 15.9155 15.9155 0 0 1 0 31.831
        a 15.9155 15.9155 0 0 1 0 -31.831"
    />
  </svg>

  <div class="content">
    <span class="value">{{ progress }}%</span>
    <span class="label">{{ label }}</span>
  </div>
</div>
